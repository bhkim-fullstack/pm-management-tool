spring.application.name=PmManagementTool

# SQLite
spring.datasource.url=jdbc:sqlite:./data/pm-management-tool.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# Hibernate's auto-DDL for SQLite doesn't declare "id INTEGER PRIMARY KEY", so
# generated-key inserts silently write NULL into the id column. Schema is
# hand-written in schema.sql instead.
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.jpa.open-in-view=false
