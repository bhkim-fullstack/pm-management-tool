<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>PM Management Tool</title>
	<link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
	<div class="layout">
		<aside class="sidebar">
			<h2>프로젝트</h2>
			<form id="new-project-form">
				<input type="text" id="new-project-name" placeholder="새 프로젝트 이름" required>
				<button type="submit">추가</button>
			</form>
			<ul id="project-list"></ul>
		</aside>

		<main class="main">
			<div id="sticky-top" class="sticky-top">
				<form id="new-person-form" class="new-person-form">
					<input type="text" id="new-person-name" placeholder="담당자 이름" required>
					<button type="submit">담당자 추가</button>
				</form>
				<div id="people-bar" class="people-bar">
					<div id="people-with-tasks" class="people-group"></div>
					<div id="people-without-tasks" class="people-group people-group-empty"></div>
				</div>
				<div id="calendar-toolbar" class="calendar-toolbar">
					<h2 id="calendar-title" class="calendar-title"></h2>
					<div class="calendar-toolbar-buttons">
						<button type="button" id="calendar-today-button">오늘</button>
						<button type="button" id="calendar-prev-button" aria-label="이전달">‹</button>
						<button type="button" id="calendar-next-button" aria-label="다음달">›</button>
					</div>
				</div>
			</div>
			<div id="calendar"></div>
		</main>

		<aside class="notes">
			<h2>메모 <span id="memo-status" class="memo-status"></span></h2>
			<textarea id="memo-textarea" placeholder="메모를 입력하세요"></textarea>
		</aside>
	</div>

	<dialog id="task-modal">
		<form id="task-form" method="dialog">
			<h3 id="task-modal-title">새 일정</h3>
			<label>
				제목
				<input type="text" id="task-title" required>
			</label>
			<label>
				담당자
				<select id="task-person">
					<option value="">미배정</option>
				</select>
			</label>
			<label>
				시작일
				<input type="date" id="task-start" required>
			</label>
			<label>
				마감일
				<input type="date" id="task-end" required>
			</label>
			<div class="task-modal-actions">
				<button type="button" id="task-delete-button">삭제</button>
				<span class="spacer"></span>
				<button type="button" id="task-cancel-button">취소</button>
				<button type="submit" id="task-save-button">저장</button>
			</div>
		</form>
	</dialog>

	<script th:src="@{/vendor/fullcalendar/index.global.min.js}"></script>
	<script th:src="@{/vendor/fullcalendar/locales-all.global.min.js}"></script>
	<script th:src="@{/js/home.js}"></script>
</body>
</html>
