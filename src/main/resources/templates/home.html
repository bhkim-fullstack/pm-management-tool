<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>PM Management Tool</title>
	<link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
	<div id="workspace-bar" class="workspace-bar">
		<div id="workspace-tabs" class="workspace-tabs"></div>
		<button type="button" id="add-workspace-button" class="add-workspace-button" aria-label="워크스페이스 추가">+</button>
	</div>
	<div class="layout">
		<aside class="sidebar">
			<h2>프로젝트</h2>
			<form id="new-project-form">
				<input type="text" id="new-project-name" placeholder="새 프로젝트 이름" required>
				<button type="submit" class="btn btn-primary">추가</button>
			</form>
			<div id="all-projects-item" class="all-projects-item">모든 프로젝트</div>
			<ul id="project-list"></ul>
		</aside>

		<main class="main">
			<div id="sticky-top" class="sticky-top">
				<form id="new-person-form" class="new-person-form">
					<input type="text" id="new-person-name" placeholder="담당자 이름 (쉼표로 구분해 여러 명 입력 가능)" required>
					<button type="submit" class="btn btn-primary">담당자 추가</button>
				</form>
				<div id="people-bar" class="people-bar">
					<div id="people-with-tasks" class="people-group"></div>
					<div id="people-without-tasks" class="people-group people-group-empty"></div>
				</div>
				<div id="calendar-toolbar" class="calendar-toolbar">
					<h2 id="calendar-title" class="calendar-title"></h2>
					<div class="calendar-toolbar-buttons">
						<button type="button" id="calendar-today-button">오늘</button>
						<button type="button" id="calendar-prev-button" aria-label="이전달">‹</button>
						<button type="button" id="calendar-next-button" aria-label="다음달">›</button>
					</div>
				</div>
			</div>
			<div id="calendar"></div>
			<div class="global-memo-section">
				<h2>글로벌 메모 <span id="global-memo-status" class="memo-status"></span></h2>
				<textarea id="global-memo-textarea" placeholder="목표 등 프로젝트에 종속되지 않는 메모를 입력하세요"></textarea>
			</div>
		</main>

		<aside class="notes">
			<h2>메모 <span id="memo-status" class="memo-status"></span></h2>
			<div id="memo-tabs" class="memo-tabs" hidden></div>
			<textarea id="memo-textarea" placeholder="메모를 입력하세요"></textarea>
		</aside>
	</div>

	<dialog id="task-modal">
		<form id="task-form" method="dialog">
			<h3 id="task-modal-title">새 일정</h3>
			<label>
				제목
				<input type="text" id="task-title" required>
			</label>
			<div class="task-person-field">
				<span class="task-person-label">담당자</span>
				<div id="task-person-list" class="task-person-list"></div>
			</div>
			<label>
				시작일
				<input type="date" id="task-start" required>
			</label>
			<label>
				마감일
				<input type="date" id="task-end" required>
			</label>
			<div class="task-modal-actions">
				<button type="button" id="task-delete-button" class="btn btn-danger">삭제</button>
				<span class="spacer"></span>
				<button type="button" id="task-cancel-button" class="btn btn-secondary">취소</button>
				<button type="submit" id="task-save-button" class="btn btn-primary">저장</button>
			</div>
		</form>
	</dialog>

	<script th:src="@{/vendor/fullcalendar/index.global.min.js}"></script>
	<script th:src="@{/vendor/fullcalendar/locales-all.global.min.js}"></script>
	<script th:src="@{/js/home.js}"></script>
</body>
</html>
